<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indian Sign Language Recognition System</title>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column; /* Updated to column layout */
            height: 100vh;
            margin: 0;
            background-color: #DF826C; /* Set your desired background color */
        }

        h1 {
            margin-bottom: 20px; /* Add some space below the title */
            background-size: cover;
            color: transparent; /* Hide text to make the background image visible */
            text-align: center;
            padding: 50px; /* Adjust padding as needed */
            color: black;
        }

        .buttons-container {
            display: flex;
            gap: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #5C8A82;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #3E635B;
        }
    </style>
</head>
<body>
    <h1>Indian Sign Language Recognition System</h1>

    <div class="buttons-container">
        <a href="{{ url_for('upload') }}"><button>Upload Image</button></a>
        <form action="{{ url_for('realtime') }}" method="get">
            <button type="submit">Real-Time</button>
        </form>
        
    </div>
</body>
</html>
