<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result</title>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column; /* Updated to column layout */
            height: 100vh;
            margin: 0;
            background-color: #DF826C; /* Set your desired background color */
        }

        

        p {
            display: flex;
            gap: 20px;
        }

        p {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #5C8A82;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #3E635B;
        }
    </style>
</head>
<body>
    <h1>Result</h1>
    <p>Prediction: {{ prediction }}</p>
</body>
</html>
