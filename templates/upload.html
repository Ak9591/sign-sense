<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Classifier</title>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column; /* Updated to column layout */
            height: 100vh;
            margin: 0;
            background-color: #DF826C; /* Set your desired background color */
        }

        h1 {
            margin-bottom: 20px; /* Add some space below the title */
            background-size: cover;
            color: transparent; /* Hide text to make the background image visible */
            text-align: center;
            padding: 50px; /* Adjust padding as needed */
            color: black;
        }

        .buttons-container {
            display: flex;
            gap: 20px;
        }

        button,form {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #5C8A82;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #3E635B;
        }
    </style>
</head>
<body>
    <h1>Image Classifier</h1>
    <form action="/upload" method="post" enctype="multipart/form-data">
        <input type="file" name="image" accept="image/*" required>
        <button type="submit">Predict</button>
    </form>
</body>
</html>
